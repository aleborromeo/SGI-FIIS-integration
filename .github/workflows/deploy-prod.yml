name: CI/CD SGI-FIIS Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci_frontend:
    name: CI Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend with Vite
        working-directory: frontend
        run: npx vite build

  ci_backend:
    name: CI Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build backend package
        working-directory: backend/fiis
        run: mvn -B clean package -DskipTests

  deploy:
    name: CD Deploy to Google Cloud VM
    runs-on: ubuntu-latest
    needs:
      - ci_frontend
      - ci_backend

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.VM_SSH_KEY_B64 }}" | tr -d '\r\n\t ' | base64 -d > ~/.ssh/sgi_fiis_key
          chmod 600 ~/.ssh/sgi_fiis_key
          ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy application
        run: |
          ssh -o IdentitiesOnly=yes -i ~/.ssh/sgi_fiis_key ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'
            set -e

            cd ~/SGI-FIIS-integration

            git fetch origin
            git reset --hard origin/main

            git submodule sync --recursive
            git submodule foreach --recursive 'git reset --hard && git clean -fd'
            git submodule update --init --recursive --force

            sed -i 's/RUN npm run build/RUN npx vite build/' frontend/Dockerfile

            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build

            docker image prune -f

            docker compose --env-file .env.prod -f docker-compose.prod.yml ps
          EOF
