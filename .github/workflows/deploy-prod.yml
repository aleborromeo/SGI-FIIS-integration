name: Deploy SGI-FIIS Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Google Cloud VM
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/sgi_fiis_key
          chmod 600 ~/.ssh/sgi_fiis_key
          ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy application
        run: |
          ssh -i ~/.ssh/sgi_fiis_key ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'
            set -e

            cd ~/SGI-FIIS-integration

            git fetch origin
            git reset --hard origin/main

            git submodule sync --recursive
            git submodule update --init --recursive

            sed -i 's/RUN npm run build/RUN npx vite build/' frontend/Dockerfile

            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build

            docker image prune -f

            docker compose --env-file .env.prod -f docker-compose.prod.yml ps
          EOF
